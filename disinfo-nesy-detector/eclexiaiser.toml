# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: PMPL-1.0-or-later

[project]
name = "disinfo-nesy-detector"

[[functions]]
name = "run_inference"
source = "src/onnx_wrapper.rs"
energy-budget-mj = 120.0
carbon-budget-mg = 24.0

[[functions]]
name = "process_message"
source = "src/main.rs"
energy-budget-mj = 50.0
carbon-budget-mg = 10.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
